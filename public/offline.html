<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#fbbf24">
        <title>Wollradar Offline</title>
        <style>
            :root {
                color-scheme: light;
                font-family: Figtree, system-ui, sans-serif;
                background:
                    radial-gradient(circle at top, rgba(251, 191, 36, 0.22), transparent 28rem),
                    linear-gradient(180deg, #fffdf6, #f5f5f4);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                color: #1c1917;
            }

            main {
                width: min(100%, 28rem);
                border-radius: 32px;
                padding: 28px;
                background: rgba(255, 255, 255, 0.92);
                box-shadow: 0 20px 60px -30px rgba(28, 25, 23, 0.35);
                border: 1px solid rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(14px);
            }

            .badge {
                display: inline-flex;
                align-items: center;
                border-radius: 999px;
                background: #fef3c7;
                color: #92400e;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                padding: 8px 12px;
            }

            h1 {
                margin: 18px 0 10px;
                font-size: 32px;
                line-height: 1.05;
            }

            p {
                margin: 0;
                color: #57534e;
                line-height: 1.6;
            }

            a {
                display: inline-flex;
                margin-top: 22px;
                min-height: 44px;
                align-items: center;
                justify-content: center;
                border-radius: 18px;
                background: #fbbf24;
                color: #1c1917;
                font-weight: 700;
                text-decoration: none;
                padding: 0 18px;
            }
        </style>
    </head>
    <body>
        <main>
            <div class="badge">Offline</div>
            <h1>Wollradar ist gerade ohne Verbindung.</h1>
            <p>Bereits geladene Seiten und Dateien bleiben verfugbar. Sobald wieder Netz da ist, kannst du normal weitermachen.</p>
            <a href="/dashboard">Erneut versuchen</a>
        </main>
    </body>
</html>
